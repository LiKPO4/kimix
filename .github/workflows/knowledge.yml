name: Knowledge

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * 1"
  pull_request:
    paths:
      - "knowledge/**"
      - "scripts/validate-okf.mjs"
      - "tools/skills/deploy-okf-knowledge/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "AGENTS.md"
      - ".github/workflows/knowledge.yml"
      - ".github/workflows/release.yml"
  push:
    branches:
      - master
    paths:
      - "knowledge/**"
      - "scripts/validate-okf.mjs"
      - "tools/skills/deploy-okf-knowledge/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "AGENTS.md"
      - ".github/workflows/knowledge.yml"
      - ".github/workflows/release.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate OKF v0.1 and Kimix profile
        run: pnpm knowledge:validate

      - name: Audit knowledge freshness and discoverability
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: pnpm knowledge:audit
