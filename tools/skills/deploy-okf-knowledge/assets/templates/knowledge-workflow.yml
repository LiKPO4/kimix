name: Knowledge

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * 1"
  pull_request:
    paths:
      - "knowledge/**"
      - "scripts/validate-okf.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "AGENTS.md"
      - ".github/workflows/knowledge.yml"
  push:
    branches: [main]
    paths:
      - "knowledge/**"
      - "scripts/validate-okf.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "AGENTS.md"
      - ".github/workflows/knowledge.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm knowledge:validate
      - name: Audit knowledge freshness and discoverability
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: pnpm knowledge:audit
