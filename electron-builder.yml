appId: com.kimix.app
productName: Kimix
copyright: Copyright © 2026
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
  - "!node_modules"
  - "!src"
  - "!scripts"
  - "!electron"
  - "!**/*.map"
  - "!**/dev.cjs"
extraResources:
  - from: node_modules/@moonshot-ai/kimi-agent-sdk
    to: node_modules/@moonshot-ai/kimi-agent-sdk
asar: true
asarUnpack:
  - "**/*.node"
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  verifyUpdateCodeSignature: false
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Development
  maintainer: LiKPO4
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Kimix
# Publish config is passed via CLI in CI
# Local builds use: pnpm pack
# CI releases use: electron-builder --publish always
